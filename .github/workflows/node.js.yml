name: Expense Tracker Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install
      continue-on-error: true

    - name: Build project
      run: npm run build
      continue-on-error: true

    - name: Final step
      run: echo "Pipeline executed successfully"
